version: 1
registry_type: runtime_skills
required_first_version: true
updated_by: Agentic-QA
layers:
  core: 通用输入、上下文、检索和输出格式化能力
  analysis: 需求分析、范围拆解和风险识别能力
  test-design: 测试方法选择、用例生成和用例评审能力
  reporting: QA 报告生成能力
  knowledge: 知识沉淀能力
skills:
  - id: S1
    name: 需求理解 Skill
    file: skills/core/requirement-understanding-skill.md
    layer: core
    priority: 1
    required_first_version: true
    applies_to: [analysis, testcase_generation, analysis_and_testcases]
    purpose: 解析 PRD / Markdown / 飞书文档，提取背景、角色、流程、规则、限制
  - id: S2
    name: 上下文构建 Skill
    file: skills/core/context-building-skill.md
    layer: core
    priority: 2
    required_first_version: true
    applies_to: [analysis, testcase_generation, analysis_and_testcases]
    purpose: 整理用户输入、项目知识、历史记忆和召回内容，形成完整上下文
  - id: S3
    name: RAG 检索 Skill
    file: skills/core/rag-retrieval-skill.md
    layer: core
    priority: 3
    required_first_version: true
    applies_to: [analysis, testcase_generation, analysis_and_testcases]
    purpose: 从知识库、历史用例、历史缺陷、规则文档中召回相关内容
  - id: S4
    name: 测试范围拆解 Skill
    file: skills/analysis/test-scope-decomposition-skill.md
    layer: analysis
    priority: 4
    required_first_version: true
    applies_to: [analysis, testcase_generation, analysis_and_testcases]
    purpose: 拆模块、功能点、影响范围、正逆向链路
  - id: S5
    name: 风险识别 Skill
    file: skills/analysis/risk-identification-skill.md
    layer: analysis
    priority: 5
    required_first_version: true
    applies_to: [analysis, testcase_generation, analysis_and_testcases]
    purpose: 识别金额、库存、状态流、权限、并发、异常、边界等高风险
  - id: S6
    name: 测试方法选择 Skill
    file: skills/test-design/test-method-selection-skill.md
    layer: test-design
    priority: 6
    required_first_version: true
    applies_to: [testcase_generation, analysis_and_testcases]
    purpose: 自动判断该用边界值、等价类、判定表、状态迁移、场景法等测试方法
  - id: S7
    name: 测试用例生成 Skill
    file: skills/test-design/testcase-generation-skill.md
    layer: test-design
    priority: 7
    required_first_version: true
    applies_to: [testcase_generation, analysis_and_testcases]
    purpose: 按固定格式生成测试用例
  - id: S8
    name: 用例评审 Skill
    file: skills/test-design/testcase-review-skill.md
    layer: test-design
    priority: 8
    required_first_version: true
    applies_to: [testcase_generation, analysis_and_testcases]
    purpose: 检查漏测、重复、预期不清、步骤不完整、优先级错误
  - id: S9
    name: 输出格式化 Skill
    file: skills/core/output-formatting-skill.md
    layer: core
    priority: 9
    required_first_version: true
    applies_to: [analysis, testcase_generation, analysis_and_testcases, qa_report]
    purpose: 输出 Markdown / JSON / YAML / XMind 数据结构
  - id: S10
    name: 知识沉淀 Skill
    file: skills/knowledge/knowledge-capture-skill.md
    layer: knowledge
    priority: 10
    required_first_version: true
    applies_to: [qa_report]
    purpose: 把确认后的规则、用例、缺陷经验沉淀到知识库
