[tool.poetry]
name = "ai-assistant"
version = "0.1.0"
description = "Personal AI assistant for senior test engineering work."
authors = ["EDY <unknown@example.com>"]
readme = "README.md"
package-mode = false

[tool.poetry.dependencies]
python = "^3.13"
PyYAML = "^6.0.3"

# Optional runtime integrations (kept lightweight by default)
psycopg = { version = "^3.3.2", optional = true }

[tool.poetry.extras]
postgres = ["psycopg"]

[tool.poetry.group.dev.dependencies]
pytest = "^9.0.2"

[tool.pytest.ini_options]
testpaths = ["tests"]
norecursedirs = ["workspace", ".git", ".pytest_cache", "__pycache__"]
markers = [
  "ai_generated: cases converted from generated natural-language test cases",
]

[build-system]
requires = ["poetry-core>=2.0.0"]
build-backend = "poetry.core.masonry.api"

