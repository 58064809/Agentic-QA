[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentic-qa"
version = "0.1.0"
description = "Command-routed human-in-the-loop Agentic QA workspace."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "pytest>=8",
  "pytest-json-report>=1.5",
  "typer>=0.12",
  "rich>=13",
  "pyyaml>=6",
  "ruff>=0.8",
]

[tool.setuptools]
py-modules = []

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
