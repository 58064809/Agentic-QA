# Project-level Codex configuration for Agentic-QA.
# Keep secrets, auth state, logs, sqlite databases, and plugin caches out of Git.

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "."]

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]

[mcp_servers.sequential_thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

[mcp_servers.github]
command = "powershell"
args = [
  "-NoProfile",
  "-ExecutionPolicy",
  "Bypass",
  "-Command",
  "$env:GITHUB_PERSONAL_ACCESS_TOKEN=(gh auth token); npx -y @modelcontextprotocol/server-github",
]

[plugins."github@openai-curated"]
enabled = true

[plugins."figma@openai-curated"]
enabled = true

