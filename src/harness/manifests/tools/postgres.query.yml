schema_version: agentic-qa.harness.tool-manifest.v2
name: postgres.query
provider: builtin
description: 对 workspace 显式配置的 PostgreSQL 测试数据源执行单条只读查询
input_schema:
  type: object
  required: [query]
  properties:
    query: {type: string, minLength: 1}
    parameters: {type: array}
  additionalProperties: false
output_schema: {type: object}
risk: read_only
timeout_seconds: 30
idempotency: read
