schema_version: agentic-qa.harness.tool-manifest.v1
name: artifact.diff
provider: builtin
description: 比较候选和已发布产物
input_schema:
  type: object
  required: [before, after]
  properties:
    before: {type: string, minLength: 1}
    after: {type: string, minLength: 1}
  additionalProperties: false
output_schema: {type: object}
risk: read_only
timeout_seconds: 10
idempotency: read
