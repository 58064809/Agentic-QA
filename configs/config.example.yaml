app:
  name: agentic-qa
  env: dev
  profile: default

input:
  support_feishu_doc: true
  support_markdown: true
  max_file_chars: 200000

llm:
  # 全局 LLM 开关。false 时语义路由和生成节点走确定性降级。
  enabled: true
  semantic_router_enabled: true
  # 密钥只从环境变量读取。
  provider: deepseek
  api_key_env: DEEPSEEK_API_KEY
  base_url_env: DEEPSEEK_BASE_URL
  model_env: DEEPSEEK_MODEL
  base_url: https://api.deepseek.com
  model: deepseek-v4-flash
  enable_chat_fallback: true
  max_input_chars: 32000

runtime:
  default_entry: cli
  record_runs: true
  idempotency_enabled: true
  fail_fast_required_nodes: true
  checkpointer: postgres
  checkpoint_postgres_dsn_env: AGENTIC_QA_CHECKPOINT_POSTGRES_DSN
  checkpoint_postgres_setup: true

workspace:
  prd_root: prd
  runtime_root: .runtime
  runs_dir_name: runs
  artifacts_dir_name: artifacts
  reviews_dir_name: reviews
  metadata_file: metadata.yml

entries:
  cli_enabled: true
  api_enabled: false
  chat_enabled: true
  bot_enabled: false

logging:
  level: INFO
  dir: logs
  redact_secrets: true

observability:
  provider: langsmith
  enabled: false
  endpoint: https://api.smith.langchain.com
  api_key_env: LANGSMITH_API_KEY
  project: agentic-qa
  tags:
    - agentic-qa

workflow:
  # Workflow 文件和 context files 由 runtime/workflow/catalog.py 唯一管理，配置不可覆盖。
  use_llm:
    requirement_analysis: true
    testcase_generation: true
    mvp_analysis_testcases: true
    api_test_draft: true
    ui_test_draft: true
    api_discovery_report: true
    qa_report: true

rag:
  enabled: true
  top_k: 5
  embedding_provider: auto
  use_llm_api_key: true
  api_key_env: RAG_API_KEY
  base_url: null
  vector_store: faiss
  chunk_size: 500
  chunk_overlap: 50
  embedding_model: text-embedding-3-small
  embedding_dim: 1536
  index_dir: .rag_index
  query_max_chars: 8000
  knowledge_paths:
    - knowledge/qa-methodology
    - knowledge/project-rules
    - knowledge/templates

output:
  markdown: true
  yaml: true
  json: true
  write_artifact_preview: true
  require_review_gate: true

profiles:
  default: {}
