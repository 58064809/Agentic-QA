name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Validate docs consistency
        run: python scripts/validate_docs_consistency.py

      - name: Run tests
        run: pytest -q

      - name: Run ruff
        run: ruff check .

      - name: Build and inspect wheel
        run: |
          python -m pip install build
          python -m build --wheel
          python -c "import zipfile,glob; names=zipfile.ZipFile(glob.glob('dist/*.whl')[0]).namelist(); assert any(n.startswith('harness/') for n in names); assert not any(n.startswith(('runtime/','rag/')) for n in names)"
