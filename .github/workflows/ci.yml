name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PG_LOCAL_HOST: localhost
      PG_LOCAL_PORT: 5432
      PG_LOCAL_DATABASE: postgres
      PG_LOCAL_USER: postgres
      PG_LOCAL_PASSWORD: postgres
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Run ruff
        run: ruff check .

      - name: Build and inspect wheel
        run: |
          python -m pip install build
          python -m build --wheel
          python -c "import zipfile,glob; names=zipfile.ZipFile(glob.glob('dist/*.whl')[0]).namelist(); assert all(any(n.startswith(p) for n in names) for p in ('harness/domain/','harness/application/','harness/infrastructure/','harness/interfaces/','harness/manifests/','harness/knowledge/')); assert not any(n.startswith(('runtime/','rag/','scripts/')) for n in names)"
