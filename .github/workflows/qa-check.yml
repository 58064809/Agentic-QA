name: qa-check

on:
  pull_request:
  push:
    branches: [master]

jobs:
  qa-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Validate sample PRD workspace
        run: python scripts/validate_prd_workspace.py prd/sample-login-requirement
