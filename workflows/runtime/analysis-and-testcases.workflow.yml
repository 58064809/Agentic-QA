id: analysis_and_testcases
name: 需求分析与测试用例生成
version: 1

input:
  prd_path: required
  user_input: required

state:
  task_type: mvp_analysis_testcases

nodes:
  - id: command_router
    type: python
    handler: runtime.graph.nodes.mvp_context_loader.mvp_command_router_node

  - id: workflow_selector
    type: python
    handler: runtime.graph.nodes.mvp_context_loader.mvp_workflow_selector_node

  - id: requirement_normalizer
    type: python
    handler: runtime.graph.nodes.requirement_normalizer.normalize_requirement_document

  - id: context_loader
    type: python
    handler: runtime.graph.nodes.mvp_context_loader.mvp_context_loader_node

  - id: requirement_analysis_generator
    type: python
    handler: runtime.graph.nodes.mvp_generation.requirement_analysis_generation_node

  - id: requirement_analysis_quality
    type: python
    handler: runtime.graph.nodes.mvp_quality.requirement_analysis_quality_check_node

  - id: testcase_generator
    type: python
    handler: runtime.graph.nodes.mvp_generation.testcase_generation_mvp_node

  - id: testcase_quality
    type: python
    handler: runtime.graph.nodes.mvp_quality.testcase_mvp_quality_check_node

  - id: review_gate
    type: python
    handler: runtime.graph.nodes.human_review.human_review_node

  - id: artifact_preview_writer
    type: python
    handler: runtime.graph.nodes.artifact_preview_writer.artifact_preview_writer_node

  - id: metadata_update
    type: python
    handler: runtime.graph.nodes.metadata_update.metadata_update_node

edges:
  - from: start
    to: command_router

  - from: command_router
    to: workflow_selector
    condition: no_errors

  - from: command_router
    to: end
    condition: default

  - from: workflow_selector
    to: requirement_normalizer
    condition: no_errors

  - from: workflow_selector
    to: end
    condition: default

  - from: requirement_normalizer
    to: context_loader
    condition: no_errors

  - from: requirement_normalizer
    to: end
    condition: default

  - from: context_loader
    to: requirement_analysis_generator
    condition: task_is_analysis_or_mvp

  - from: context_loader
    to: end
    condition: default

  - from: requirement_analysis_generator
    to: requirement_analysis_quality

  - from: requirement_analysis_quality
    to: testcase_generator
    condition: task_is_mvp

  - from: requirement_analysis_quality
    to: end
    condition: default

  - from: testcase_generator
    to: testcase_quality

  - from: testcase_quality
    to: review_gate
    condition: no_quality_errors

  - from: testcase_quality
    to: end
    condition: default

  - from: review_gate
    to: artifact_preview_writer
    condition: needs_human_review_or_approved

  - from: review_gate
    to: end
    condition: default

  - from: artifact_preview_writer
    to: metadata_update

  - from: metadata_update
    to: end
