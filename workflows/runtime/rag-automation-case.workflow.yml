id: rag_automation_case_generation
name: RAG 接口自动化 YAML 用例生成
version: 1

input:
  prd_path: required
  user_input: required

state:
  # RAG YAML 用例是 api_test_draft 的机器可消费 sidecar，复用现有
  # artifact-preview / review / promote 产物流转，不引入新产物类型。
  intent: rag_automation_case_generation
  task_type: api_test_draft

nodes:
  - id: context_pipeline
    type: subgraph
    workflow: rag_automation_context_pipeline

  - id: case_generation
    type: subgraph
    workflow: rag_automation_case_generation_core

  - id: artifact_preview_writer
    type: python
    handler: runtime.graph.nodes.artifact_preview_writer.artifact_preview_writer_node

  - id: metadata_update
    type: python
    handler: runtime.graph.nodes.metadata_update.metadata_update_node

  - id: review_gate
    type: python
    handler: runtime.graph.nodes.human_review.human_review_node

  - id: promote_pipeline
    type: subgraph
    workflow: rag_automation_promote_pipeline

edges:
  - from: start
    to: context_pipeline

  - from: context_pipeline
    to: case_generation
    condition: no_errors

  - from: context_pipeline
    to: end
    condition: default

  - from: case_generation
    to: artifact_preview_writer
    condition: no_quality_errors

  - from: case_generation
    to: end
    condition: default

  - from: artifact_preview_writer
    to: metadata_update
    condition: no_errors

  - from: artifact_preview_writer
    to: end
    condition: default

  - from: metadata_update
    to: review_gate
    condition: no_errors

  - from: metadata_update
    to: end
    condition: default

  - from: review_gate
    to: promote_pipeline
    condition: review_approved

  - from: review_gate
    to: case_generation
    condition: review_needs_changes

  - from: review_gate
    to: end
    condition: review_rejected

  - from: review_gate
    to: end
    condition: review_waiting

  - from: review_gate
    to: end
    condition: default

  - from: promote_pipeline
    to: end
