id: rag_automation_case_generation_core
name: RAG 自动化 YAML 用例生成子图
version: 1

input:
  prd_path: required
  user_input: required

nodes:
  - id: api_test_generator
    type: python
    handler: runtime.graph.nodes.api_test_generation.api_test_generation_node

  - id: api_test_quality
    type: python
    handler: runtime.graph.nodes.api_test_generation.api_test_quality_check_node

  - id: api_test_reviser
    type: python
    handler: runtime.graph.nodes.api_test_generation.api_test_revision_node

edges:
  - from: start
    to: api_test_generator

  - from: api_test_generator
    to: api_test_quality

  - from: api_test_quality
    to: api_test_reviser
    condition: has_quality_errors

  - from: api_test_quality
    to: end
    condition: no_quality_errors

  - from: api_test_quality
    to: end
    condition: default

  - from: api_test_reviser
    to: end
    condition: no_quality_errors

  - from: api_test_reviser
    to: end
    condition: default
