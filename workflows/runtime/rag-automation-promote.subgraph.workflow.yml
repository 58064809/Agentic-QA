id: rag_automation_promote_pipeline
name: RAG 自动化 YAML 用例发布子图
version: 1

input:
  prd_path: required
  user_input: required

nodes:
  - id: artifact_promoter
    type: python
    handler: runtime.graph.nodes.artifact_promoter.artifact_promoter_node

  - id: metadata_update
    type: python
    handler: runtime.graph.nodes.metadata_update.metadata_update_node

edges:
  - from: start
    to: artifact_promoter

  - from: artifact_promoter
    to: metadata_update
    condition: no_errors

  - from: artifact_promoter
    to: end
    condition: default

  - from: metadata_update
    to: end
