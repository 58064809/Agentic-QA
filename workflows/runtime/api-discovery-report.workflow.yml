id: api_discovery_report
name: 接口发现报告生成
version: 1

input:
  prd_path: required
  user_input: required

state:
  task_type: api_discovery_report

nodes:
  - id: command_router
    type: python
    handler: runtime.graph.nodes.mvp_context_loader.mvp_command_router_node

  - id: workflow_selector
    type: python
    handler: runtime.graph.nodes.mvp_context_loader.mvp_workflow_selector_node

  - id: requirement_normalizer
    type: python
    handler: runtime.graph.nodes.requirement_normalizer.normalize_requirement_document

  - id: context_loader
    type: python
    handler: runtime.graph.nodes.mvp_context_loader.mvp_context_loader_node

  - id: api_discovery_report
    type: python
    handler: runtime.graph.nodes.api_discovery.api_discovery_report_node

  - id: api_discovery_quality
    type: python
    handler: runtime.graph.nodes.api_discovery.api_discovery_quality_check_node

  - id: artifact_preview_writer
    type: python
    handler: runtime.graph.nodes.artifact_preview_writer.artifact_preview_writer_node

  - id: review_gate
    type: python
    handler: runtime.graph.nodes.human_review.human_review_node

  - id: metadata_update
    type: python
    handler: runtime.graph.nodes.metadata_update.metadata_update_node

edges:
  - from: start
    to: command_router
  - from: command_router
    to: workflow_selector
    condition: no_errors
  - from: command_router
    to: end
    condition: default
  - from: workflow_selector
    to: requirement_normalizer
    condition: no_errors
  - from: workflow_selector
    to: end
    condition: default
  - from: requirement_normalizer
    to: context_loader
    condition: no_errors
  - from: requirement_normalizer
    to: end
    condition: default
  - from: context_loader
    to: api_discovery_report
    condition: task_is_api_discovery_report
  - from: context_loader
    to: end
    condition: default
  - from: api_discovery_report
    to: api_discovery_quality
  - from: api_discovery_quality
    to: artifact_preview_writer
    condition: no_quality_errors
  - from: api_discovery_quality
    to: end
    condition: default
  - from: artifact_preview_writer
    to: review_gate
    condition: no_errors
  - from: artifact_preview_writer
    to: end
    condition: default
  - from: review_gate
    to: metadata_update
    condition: no_errors
  - from: review_gate
    to: end
    condition: default
  - from: metadata_update
    to: end
