site_name: Agentic-QA
site_description: Agentic QA Engineering — 面向测试工程师的 AI 辅助软件测试工程工作流
repo_url: https://github.com/58064809/Agentic-QA
repo_name: 58064809/Agentic-QA
edit_uri: edit/master/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换浅色模式

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.highlight
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 架构与设计:
      - 系统架构: architecture.md
      - 建设路线图: roadmap.md
  - 工作流与运行时:
      - Workflow DSL: workflow-dsl.md
      - 运行时可靠性: runtime-reliability.md
      - 产物版本管理: artifact-versioning.md
      - Review Gate 确认门禁: review-gate.md
  - QA 产物标准:
      - 产物标准: artifact-standards.md
      - 测试用例标准: testcase-standards.md
      - QA 报告生成: qa-report-generation.md
  - 测试生成:
      - 接口测试生成: api-test-generation.md
      - UI 测试生成: ui-test-generation.md
      - 接口发现: api-discovery.md
      - 自动化用例生成: automation-case-generation.md
  - RAG:
      - RAG 设计: rag-design.md
      - RAG 架构: rag-architecture.md
      - RAG 运行记录规范: rag-run-record-spec.md
  - 其他:
      - Codex 本地同步: codex-local-sync.md
